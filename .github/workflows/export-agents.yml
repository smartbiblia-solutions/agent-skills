name: Export Agents (GitAgent Multi-Format)

on:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install GitAgent CLI
        run: npm install -g @open-gitagent/gitagent

      # Detect all agents (folders containing agent.yaml)
      - name: Find agents
        id: agents
        run: |
          AGENTS=$(find agents -name "agent.yaml" -exec dirname {} \; | jq -R -s -c 'split("\n")[:-1]')
          echo "agents=$AGENTS" >> $GITHUB_OUTPUT
          
      - name: Resolve external skills
        run: |
            mkdir -p tmp

            for agent in $(find agents -name "agent.yaml" -exec dirname {} \;); do
              echo "🔧 Resolving skills for $agent"

              mkdir -p "$agent/skills"

              python3 <<EOF
        import yaml, os, subprocess, shutil

        agent_dir = "$agent"
        agent_file = os.path.join(agent_dir, "agent.yaml")

        with open(agent_file) as f:
            data = yaml.safe_load(f)

        skills = data.get("skills", [])

        for skill in skills:
            if isinstance(skill, str) and skill.startswith("github.com"):
                print(f"📦 Resolving {skill}")

                # Parse URL
                # github.com/org/repo/tree/branch/path
                parts = skill.split("/")
                org = parts[1]
                repo = parts[2]
                branch = parts[4]
                subpath = "/".join(parts[5:])

                clone_dir = f"tmp/{repo}"

                if not os.path.exists(clone_dir):
                    subprocess.run(
                        ["git", "clone", "--depth", "1", "--branch", branch,
                         f"https://github.com/{org}/{repo}.git", clone_dir],
                        check=True
                    )

                source_path = os.path.join(clone_dir, subpath)
                target_path = os.path.join(agent_dir, "skills", os.path.basename(subpath))

                if os.path.exists(target_path):
                    shutil.rmtree(target_path)

                shutil.copytree(source_path, target_path)

        EOF
            done

          # Export loop
      - name: Export all agents
        run: |
          mkdir -p build

          for agent in $(echo '${{ steps.agents.outputs.agents }}' | jq -r '.[]'); do
            name=$(basename "$agent")

            echo "Processing $name"

            # Validate
            gitagent validate "$agent"

            # Create output folder
            mkdir -p build/$name

            # Export formats
            gitagent export "$agent" --format claude-code --output build/$name/claude
            gitagent export "$agent" --format codex --output build/$name/codex
            gitagent export "$agent" --format opencode --output build/$name/opencode
            gitagent export "$agent" --format openclaw --output build/$name/openclaw
            gitagent export "$agent" --format nanobot --output build/$name/nanobot
            gitagent export "$agent" --format cursor --output build/$name/cursor

            # Optional: system prompt
            gitagent export "$agent" --format system-prompt > build/$name/system-prompt.txt
          done

      # Zip artifacts
      - name: Zip artifacts
        run: |
          cd build
          for dir in */ ; do
            zip -r "${dir%/}.zip" "$dir"
          done

      # Upload artifacts (for debugging / CI)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: exported-agents
          path: build/

      # Create GitHub Release (only on tags)
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build/*.zip